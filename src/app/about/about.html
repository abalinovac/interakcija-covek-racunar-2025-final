<h1 class="h3">About the app</h1>
<p>Aplikacija sa vežbi iz predmeta Interakcija Čovek Računar na 4 godini Tehničkog Fakulteta Univerziteta Singidunum.
</p>
<p>Aplikacija je razvijena koristeći sledeće tehnologije:</p>

<ul>
    <li>Angular 20</li>
    <li>Bootstrap 5.3</li>
    <li>Fonts Awesome 7</li>
    <li>Axios HTTP Client</li>
    <li>Rasa Open Source</li>
</ul>
