<div class="input-group mb-3">
    <span class="input-group-text" id="addon">
        <i class="fa-solid fa-magnifying-glass"></i>
    </span>
    <input type="text" class="form-control" placeholder="Search" aria-describedby="addon" [(ngModel)]="search" (keyup)="loadToys()">
</div>
<div class="toys">
    @for (toy of toys(); track $index) {
    <div class="card">
        <img [src]="'https://toy.pequla.com' + toy.imageUrl" class="card-img-top" [alt]="toy.name">
        <div class="card-body">
            <h5 class="card-title">{{toy.name}}</h5>
            <p class="card-text">{{toy.description}}</p>
        </div>
        <div class="card-footer btn-group">
            <a class="btn btn-sm btn-primary" [routerLink]="`/toy/${toy.toyId}`">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Details
            </a>
            <a class="btn btn-sm btn-success" [routerLink]="`/toy/${toy.toyId}/reservation`">
                <i class="fa-solid fa-cart-shopping"></i> Add to Cart
            </a>
        </div>
    </div>
    }
</div>
