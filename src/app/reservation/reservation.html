@if (movie()) {
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a routerLink="/">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a [routerLink]="`/movie/${movie()?.shortUrl}`">{{movie()?.title}}</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">Reservation</li>
    </ol>
</nav>
<div class="row">
    <div class="col-12 col-md-4">
        <img [src]="movie()?.poster" [alt]="movie()?.title" class="img-fluid">
    </div>
    <div class="col-12 col-md-8">
        <div class="card">
           <form [formGroup]="form" (ngSubmit)="onSubmit()">
             <div class="card-header">
                <h5><i class="fa-solid fa-film"></i>{{movie()?.title}}</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="time" class="form-label">Time</label>
                    <select class="form-select" id="time" formControlName="time">
                    <option value="Utorak 22h">Utorak u 22h</option>
                    <option value="Sreda 20h">Sreda u 20h</option>
                    <option value="Petak 19h">Petak u 19h</option>
                    <option value="Petak 21h">Petak u 21h</option>
                </select>
                </div>
                <div class="mb-3">
                    <label for="cinema" class="form-label">Cinema</label>
                    <select class="form-select" id="cinema" formControlName="cinema">
                    <option value="Ušće">Ušće Shopping Centar</option>
                    <option value="Rakovica">BIG Rakovica</option>
                    <option value="Rajićeva">Rajićeva</option>
                    <option value="Ada Mall">Ada Mall</option>
                </select>
                </div>
                <div class="mb-3">
                    <label for="hall" class="form-label">Hall</label>
                    <select class="form-select" id="hall" formControlName="hall">
                    <option value="Velika">Velika</option>
                    <option value="Mala">Mala</option>
                    <option value="Privatna">Privatna (do 12 osoba)</option>                  
                </select>
                </div>
                 <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" formControlName="quantity">
                 </div>
            </div>
            <div class="card-footer">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-cart-shopping"></i> Book now
                </button>
            </div>
           </form>
        </div>
    </div>
</div>
}
