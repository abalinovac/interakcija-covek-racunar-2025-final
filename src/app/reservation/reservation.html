@if (toy()) {
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a routerLink="/">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a [routerLink]="`/toy/${toy()?.toyId}`">{{toy()?.name}}</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">Reservation</li>
    </ol>
</nav>
<div class="row">
    <div class="col-12 col-md-4">
        <img [src]="toy()?.imageUrl" [alt]="toy()?.name" class="img-fluid">
    </div>
    <div class="col-12 col-md-8">
        <div class="card">
           <form [formGroup]="form" (ngSubmit)="onSubmit()">
             <div class="card-header">
                <h5><i class="fa-solid fa-film"></i>{{toy()?.name}}</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="time" class="form-label">Time</label>
                    <select class="form-select" id="time" formControlName="time">
                    <option value="Utorak 22h">Utorak u 22h</option>
                    <option value="Sreda 20h">Sreda u 20h</option>
                    <option value="Petak 19h">Petak u 19h</option>
                    <option value="Petak 21h">Petak u 21h</option>
                </select>
            </div>
                 <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" formControlName="quantity">
                 </div>
            </div>
            <div class="card-footer">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-cart-shopping"></i> Buy now
                </button>
            </div>
           </form>
        </div>
    </div>
</div>
}
